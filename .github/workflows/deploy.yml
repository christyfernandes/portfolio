name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # IMPORTANT: base-href must match your repository name so assets resolve
      # under https://<user>.github.io/<REPO-NAME>/. The trailing slash matters.
      - name: Build (production)
        run: npm run build -- --base-href "/${{ github.event.repository.name }}/"

      # SPA + 404 fallback so deep links work, and disable Jekyll processing.
      - name: Prepare Pages artifact
        run: |
          DIST="dist/cf-portfolio/browser"
          cp "$DIST/index.html" "$DIST/404.html"
          touch "$DIST/.nojekyll"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/cf-portfolio/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
