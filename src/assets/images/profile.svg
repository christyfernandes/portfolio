<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="gbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1a30"/>
      <stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0f1a30" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="480" fill="url(#gbg)"/>

  <!-- Soft glow -->
  <ellipse cx="200" cy="210" rx="200" ry="190" fill="url(#glow)"/>

  <!-- Shoulders / body shape -->
  <ellipse cx="200" cy="460" rx="170" ry="110" fill="url(#g1)" opacity="0.25"/>
  <ellipse cx="200" cy="420" rx="130" ry="80" fill="url(#g1)" opacity="0.3"/>

  <!-- Neck -->
  <rect x="178" y="295" width="44" height="60" rx="10" fill="url(#g1)" opacity="0.35"/>

  <!-- Head -->
  <circle cx="200" cy="230" r="95" fill="#13203b"/>
  <circle cx="200" cy="230" r="95" fill="url(#g1)" opacity="0.3"/>

  <!-- Face gradient overlay -->
  <circle cx="200" cy="220" r="75" fill="url(#g1)" opacity="0.15"/>

  <!-- Initials -->
  <text
    x="200" y="252"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="64"
    font-weight="700"
    fill="white"
    opacity="0.65"
    letter-spacing="-2"
  >CF</text>

  <!-- Bottom label strip -->
  <rect x="80" y="448" width="240" height="22" rx="11" fill="rgba(255,255,255,0.04)"/>
  <text
    x="200" y="463"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="10"
    fill="rgba(255,255,255,0.3)"
    letter-spacing="1.5"
  >REPLACE WITH YOUR PHOTO</text>
</svg>
